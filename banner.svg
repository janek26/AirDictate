  </defs>

  <rect width="720" height="220" rx="12" fill="url(#bg)"/>

  <text x="360" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="38" font-weight="700" fill="#F0F6FC" text-anchor="middle" letter-spacing="-1">AirDictate</text>
  <text x="360" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="14" fill="#8B949E" text-anchor="middle">Prompt your coding agent without touching your Mac.</text>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="13" font-weight="500" text-anchor="middle">
