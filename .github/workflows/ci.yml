name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Package .app bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash scripts/package.sh

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/AirDictate.app.zip
          generate_release_notes: true
